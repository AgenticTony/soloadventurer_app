mutation CreateCheckIn(
  $userId: ID!
  $scheduledTime: String!
  $deadline: String
  $location: LocationInput
  $statusMessage: String
  $notifyContactIds: [String!]
  $tripId: String
  $triggerType: String
) {
  createCheckIn(
    userId: $userId
    scheduledTime: $scheduledTime
    deadline: $deadline
    location: $location
    statusMessage: $statusMessage
    notifyContactIds: $notifyContactIds
    tripId: $tripId
    triggerType: $triggerType
  ) {
    id
    userId
    scheduledTime
    deadline
    location {
      latitude
      longitude
      accuracy
      altitude
      timestamp
      address
      placeName
    }
    status
    statusMessage
    triggerType
    completedAt
    createdAt
    updatedAt
  }
}
