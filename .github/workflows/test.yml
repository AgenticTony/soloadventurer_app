name: Flutter Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FLUTTER_VERSION: '3.38.6'
  CACHE_VERSION: v1

jobs:
  # =============================================================================
  # ANALYZE & FORMAT
  # =============================================================================
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting (non-blocking — tracked debt)
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code (errors-only gate; warnings/info are tracked debt)
        run: |
          set +e
          flutter analyze > analyze.log 2>&1
          cat analyze.log
          if grep -q 'error •' analyze.log; then
            echo "::error::Analyzer ERRORS found (see above)"
            exit 1
          fi
          echo "No analyzer errors. Warnings/info above are tracked debt (non-blocking)."

  # =============================================================================
  # UNIT & WIDGET TESTS WITH COVERAGE
  # =============================================================================
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests with coverage (non-blocking on known-stale fails)
        continue-on-error: true
        run: flutter test --coverage --reporter=github

      - name: Check coverage threshold (80%)
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>/dev/null | grep lines | grep -oP '\d+\.\d+(?=%)' || echo "0")
          echo "Line coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage ($COVERAGE%) is below 80% threshold"
            exit 1
          fi
          echo "✅ Coverage ($COVERAGE%) meets 80% threshold"
        continue-on-error: true  # Don't fail yet, but report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          fail_ci_if_error: false
          flags: unittests
          name: flutter-coverage

  # =============================================================================
  # BUILD MATRIX (iOS/Android)
  # =============================================================================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [analyze, test]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Android (APK)
            os: ubuntu-latest
            build_cmd: flutter build apk --release
            artifact: build/app/outputs/flutter-apk/app-release.apk
          - target: iOS (No Codesign)
            os: macos-latest
            build_cmd: flutter build ios --release --no-codesign
            artifact: build/ios/iphoneos/Runner.app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build ${{ matrix.target }}
        run: ${{ matrix.build_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  # =============================================================================
  # INTEGRATION TESTS (Android Emulator)
  # =============================================================================
  integration-test-android:
    name: Integration Tests (Android)
    runs-on: macos-latest
    needs: [analyze]
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Launch Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: arm64-v8a
          profile: pixel_6
          script: flutter test integration_test --reporter=github
        continue-on-error: true  # Integration tests can be flaky in CI

  # =============================================================================
  # CI SUMMARY
  # =============================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [analyze, test, build]
    if: always()
    steps:
      - name: Check overall status
        run: |
          if [[ "${{ needs.analyze.result }}" != "success" ]]; then
            echo "❌ Code analysis failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
