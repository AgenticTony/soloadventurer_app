mutation UpdateSafetyStatus(
  $status: String!
  $message: String
  $location: SafetyStatusLocationInput
  $batteryLevel: Int
  $safetyAlertId: String
  $checkInId: String
) {
  updateSafetyStatus(
    status: $status
    message: $message
    location: $location
    batteryLevel: $batteryLevel
    safetyAlertId: $safetyAlertId
    checkInId: $checkInId
  ) {
    id
    userId
    status
    message
    location {
      latitude
      longitude
      accuracy
      altitude
      timestamp
      address
      placeName
    }
    batteryLevel
    safetyAlertId
    checkInId
    updatedAt
  }
}
